name: Test Build Solution

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-2025
            rid: win-x64
            artifact-name: windows-build
          - os: ubuntu-24.04
            rid: linux-x64
            artifact-name: linux-build

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Packages
      run: dotnet restore ME3Server_WV.sln

    - name: Build Solution
      run: dotnet build ME3Server_WV.sln -c Release --no-restore

    - name: Publish Self-Contained
      run: dotnet publish ME3Server_WV/ME3Server_WV.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish/${{ matrix.rid }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact-name }}-${{ github.sha }}
        path: publish/${{ matrix.rid }}/
        retention-days: 1
