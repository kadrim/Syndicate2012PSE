name: Draft Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-2025
            rid: win-x64
            archive-name: windows
          - os: ubuntu-24.04
            rid: linux-x64
            archive-name: linux

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Packages
      run: dotnet restore ME3Server_WV.sln

    - name: Build Solution
      run: dotnet build ME3Server_WV.sln -c Release --no-restore

    - name: Publish Self-Contained
      run: dotnet publish ME3Server_WV/ME3Server_WV.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o publish/${{ matrix.rid }}

    - name: Create Release Archive (Windows)
      if: runner.os == 'Windows'
      run: |
        $dir = "Release-Syndicate2012PSE_${{ github.ref_name }}_${{ matrix.archive-name }}"
        mkdir $dir
        mkdir "$dir\logs"
        xcopy ME3Server_WV\bin\Debug $dir /s /e
        xcopy "publish\${{ matrix.rid }}" $dir /s /e /y
        xcopy Docker "$dir\Docker" /s /e /i
        xcopy Linux "$dir\Linux" /s /e /i
        xcopy SSLv3Proxy "$dir\SSLv3Proxy" /s /e /i
        xcopy submodules "$dir\submodules" /s /e /i
        xcopy Xenia-WebServices "$dir\Xenia-WebServices" /s /e /i
        xcopy docker-compose.yml $dir
        xcopy README.MD $dir
        del "$dir\*.pdb"
        Compress-Archive -Path $dir -Destination "$dir.zip"

    - name: Create Release Archive (Linux)
      if: runner.os == 'Linux'
      run: |
        DIR="Release-Syndicate2012PSE_${{ github.ref_name }}_${{ matrix.archive-name }}"
        mkdir -p "$DIR/logs"
        cp -r ME3Server_WV/bin/Debug/* "$DIR/"
        cp -r publish/${{ matrix.rid }}/* "$DIR/"
        cp -r Docker "$DIR/Docker"
        cp -r Linux "$DIR/Linux"
        cp -r SSLv3Proxy "$DIR/SSLv3Proxy"
        cp -r submodules "$DIR/submodules"
        cp -r Xenia-WebServices "$DIR/Xenia-WebServices"
        cp docker-compose.yml "$DIR/"
        cp README.MD "$DIR/"
        find "$DIR" -name "*.pdb" -delete
        chmod +x "$DIR/Syndicate2012Server"
        tar -czf "$DIR.tar.gz" "$DIR"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-${{ matrix.archive-name }}
        path: |
          Release-Syndicate2012PSE_${{ github.ref_name }}_${{ matrix.archive-name }}.zip
          Release-Syndicate2012PSE_${{ github.ref_name }}_${{ matrix.archive-name }}.tar.gz
        if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Download All Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/

    - name: Draft Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        draft: true
        files: |
          artifacts/**/*.zip
          artifacts/**/*.tar.gz
